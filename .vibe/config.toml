applied_migrations = [
    "bash_read_only_defaults_v1",
]
connectors = [
    { name = "github_app", disabled = false },
]

[tools.task]
permission = "ask"
allowlist = [
    "explore",
]

[tools.bash]
allowlist = [
    "basename",
    "cat",
    "cd",
    "comm",
    "cut",
    "date",
    "diff",
    "dirname",
    "du",
    "file",
    "find",
    "fmt",
    "fold",
    "git add",
    "git branch",
    "git commit",
    "git config --global",
    "git config --list",
    "git fetch",
    "git log",
    "git push",
    "git remote -v",
    "git status",
    "grep",
    "head",
    "join",
    "less",
    "ls",
    "md5sum",
    "more",
    "nl",
    "npx",
    "od",
    "paste",
    "pwd",
    "readlink",
    "sha1sum",
    "sha256sum",
    "shasum",
    "sort",
    "stat",
    "sum",
    "tac",
    "tail",
    "tr",
    "uname",
    "uniq",
    "wc",
    "which",
]

[tools.write_file]
permission = "always"

[tools.read_file]
allowlist = [
    "/home/morten/.vibe/plans/*",
]

[tools.grep]
allowlist = [
    "/home/morten/.vibe/plans/*",
]

[tools.connector_github_app_list_releases]
permission = "always"

[tools.connector_github_app_get_me]
permission = "always"
